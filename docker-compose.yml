version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: agrishield-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: agrishield-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/agrishield
      - JWT_SECRET=agrishield_production_secret_key_change_me
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agrishield-frontend
    restart: always
    ports:
      - "80:3000"
    environment:
      - PORT=3000
      - NITRO_PORT=3000
    depends_on:
      - backend

volumes:
  mongo-data:
